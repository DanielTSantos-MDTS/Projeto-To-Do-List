<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha To-Do-List</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; }
        .tarefa { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #ccc; }
        .concluida { text-decoration: line-through; color: gray; }
    </style>
</head>
<body>
    <h1>Minhas Tarefas</h1>
    <input type="text" id="inputTarefa" placeholder="Nova tarefa...">
    <button onclick="adicionarTarefa()">Adicionar</button>

    <div id="listaTarefas"></div>

    <script>
        const API_URL = '/tarefas';

        async function carregarTarefas(){
            const res = await fetch(API_URL);
            const tarefas = await res.json();
            const lista = document.getElementById('listaTarefas');
            lista.innerHTML = '';

            tarefas.forEach(t => {
                const div = document.createElement('div');
                div.className = `tarefa ${t.concluida ? 'concluida' : ''}`;
                div.innerHTML = `
                <span>${t.titulo}</span>
                <button onclick="deletarTarefa(${t.id})">🗑️</button>"
                `;
                lista.appendChild(div);
            })
        }

        async function adicionarTarefa(){
            const input = document.getElementById('inputTarefa');
            const titulo = input.value;
            if(!titulo) return;

            await fetch (API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ titulo })
            });
            input.value = "";
            carregarTarefas();
        }

        async function deletarTarefa(id){
            await fetch(`${API_URL}/${id}`, { method: 'DELETE'});
            carregarTarefas();
        }

        carregarTarefas();
    </script>
</body>
</html>
